; PlatformIO Project Configuration for Wifi_LorA-32_V2 (Heltec WiFi LoRa 32 V2)
; Pinout: pin4=SDA, pin15=SCL, pin2=GMZ_COUNT, pin22=HV_CAP_FUL, pin23=HV_FET_OUT,
;         pin0=Speaker1, pin13=Speaker2, pin39=sw0, pin38=sw1, pin37=sw2, pin36=sw3
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = multigeiger

[env:wifi_lora_32_v2]
board = heltec_wifi_lora_32_V2
build_flags =
  -D CFG_eu868=1
  -D CFG_sx1276_radio=1
  -D ARDUINO_LMIC_PROJECT_CONFIG_H_SUPPRESS=1
  -D hal_init=LMICHAL_init
  -D ARDUINO_LOOP_STACK_SIZE=16384
  ; Set to 1 for minimal AP only (no full config page). Set to 0 for full MultiGeiger config/OTA.
  -D MULTIGEIGER_MINIMAL_WIFI=0
  ; Don't run recharge/audio from hw timer ISRs (avoids LoadProhibited when ISR calls flash code). Recharge runs from a task.
  -D MULTIGEIGER_RECHARGE_FROM_TASK=1
  ; Core Debug Level: 0=None, 1=Error, 2=Warning, 3=Info, 4=Debug, 5=Verbose
  -D CORE_DEBUG_LEVEL=2
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Decode Guru Meditation backtrace in serial monitor (needs esp_exception_decoder filter)
monitor_filters = esp32_exception_decoder
lib_deps =
  U8g2
  Adafruit BME680 Library@^2.0.0
  Adafruit BME280 Library
  Adafruit Unified Sensor
  IotWebConf@^3.1.0
  MCCI LoRaWAN LMIC library
  h2zero/NimBLE-Arduino
  knolleary/PubSubClient@^2.8
